menuentry "Install AlmaLinux 10.1 from minimal iso (need internet connection)" {
    isofile="/boot/iso/alma/AlmaLinux-10.1-x86_64-minimal.iso"
    loopback loop "${isofile}"
    probe --set isolabel --label (loop)
    linux (loop)/images/pxeboot/vmlinuz inst.stage2=hd:LABEL=${isolabel} quiet iso-scan/filename=${isofile}
    initrd (loop)/images/pxeboot/initrd.img
}

menuentry "Install AlmaLinux 10.1 from boot iso" {
