#/boot/iso/blackarch/blackarch-linux-full-2023.04.01-x86_64.iso <- FAILED
#/boot/iso/blackarch/blackarch-linux-netinst-2023.04.01-x86_64.iso <- FAILED
#/boot/iso/blackarch/blackarch-linux-slim-2023.05.01-x86_64.iso <- FAILED


menuentry "BlackArch Live ISO Full edition 2023" {
    set isofile="/boot/iso/blackarch-linux-full-2023.04.01-x86_64.iso"
    set dri="free"
    search --set=root $isofile
    probe -u $root --set=abc
    set pqr="/dev/disk/by-uuid/$abc"
    loopback loop $isofile
    linux  (loop)/blackarch/boot/x86_64/vmlinuz-linux img_dev=$pqr img_loop=$isofile driver=$dri archisobasedir=blackarch archisolabel=BLACKARCH_202304 quiet splash vt.global_cursor_default=0 loglevel=2 rd.systemd.show_status=false rd.udev.log-priority=3 sysrq_always_enabled=1 cow_spacesize=1G
    initrd  (loop)/blackarch/boot/amd-ucode.img (loop)/blackarch/boot/intel-ucode.img (loop)/blackarch/boot/x86_64/initramfs-linux.img
}


